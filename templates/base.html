<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}FIELD DYNAMICS{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/field_dynamics.css') }}">
    <script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js" defer></script>
    {% block head %}{% endblock %}
</head>
<body style="display: flex; flex-direction: column; height: 100vh; overflow: hidden;">
    {% block before_nav %}{% endblock %}
    <nav class="nav-bar">
        <a class="nav-logo" href="/" style="text-decoration: none;">FIELD DYNAMICS</a>
        <div class="nav-items">
            <a class="nav-item {% if active_page == 'framework' %}active{% endif %}" href="/framework/" style="text-decoration: none;">Framework</a>
            <div class="nav-utility nav-item-right">
                <span class="nav-version">v{{ version }}</span>
                <a class="nav-github" href="https://github.com/fielddynamics/docs" target="_blank" rel="noopener noreferrer" aria-label="GitHub">
                    <svg viewBox="0 0 16 16" aria-hidden="true">
                        <path d="M8 0.2C3.58 0.2 0 3.78 0 8.2c0 3.54 2.29 6.54 5.47 7.6 0.4 0.07 0.55-0.17 0.55-0.39 0-0.19-0.01-0.82-0.01-1.49-2.01 0.37-2.53-0.49-2.69-0.94-0.09-0.23-0.48-0.94-0.82-1.13-0.28-0.15-0.68-0.52-0.01-0.53 0.63-0.01 1.08 0.58 1.23 0.82 0.72 1.21 1.87 0.87 2.33 0.66 0.07-0.52 0.28-0.87 0.51-1.07-1.78-0.2-3.64-0.89-3.64-3.95 0-0.87 0.31-1.59 0.82-2.15-0.08-0.2-0.36-1.02 0.08-2.13 0 0 0.67-0.21 2.2 0.82 0.64-0.18 1.32-0.27 2-0.27 0.68 0 1.36 0.09 2 0.27 1.53-1.04 2.2-0.82 2.2-0.82 0.44 1.11 0.16 1.93 0.08 2.13 0.51 0.56 0.82 1.27 0.82 2.15 0 3.07-1.87 3.75-3.65 3.95 0.29 0.25 0.54 0.73 0.54 1.48 0 1.07-0.01 1.93-0.01 2.2 0 0.22 0.15 0.47 0.55 0.39A8.01 8.01 0 0 0 16 8.2C16 3.78 12.42 0.2 8 0.2z"></path>
                    </svg>
                    <span>GitHub</span>
                </a>
                <button class="nav-mobile-toggle" id="framework-header-nav-toggle" type="button" aria-label="Open navigation" aria-controls="left-panel" aria-expanded="false">
                    <svg class="nav-mobile-toggle-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                        <path d="M4 7h16M4 12h16M4 17h16"></path>
                    </svg>
                </button>
            </div>
        </div>
    </nav>
    {% block content %}{% endblock %}
    {% block scripts %}{% endblock %}
</body>
</html>
